<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberGuard IR Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --bg2: #13181f;
    --bg3: #1a2030;
    --bg4: #1f2535;
    --border: #1e3055;
    --border2: #2a4570;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --amber: #1a7fe8;
    --amber2: #4a9ff5;
    --red: #ef4444;
    --red2: #f87171;
    --green: #22c55e;
    --green2: #4ade80;
    --blue: #3b82f6;
    --blue2: #60a5fa;
    --cyan: #06b6d4;
    --purple: #a855f7;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Exo 2', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    background-image: radial-gradient(circle, rgba(26,127,232,0.15) 1px, transparent 1px);
    background-size: 20px 20px;
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    }
